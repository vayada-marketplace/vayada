name: Playwright Pilot

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/playwright-pilot.yml"
      - "playwright.config.ts"
      - "tests/e2e/**"
      - "apps/landing/**"
      - "apps/booking-web/**"
      - "apps/affiliate-dashboard/**"
      - "apps/booking-admin/**"
      - "apps/marketplace-web/**"
      - "apps/pms-web/**"
      - "apps/vayada-admin/**"
      - "packages/marketplace-shared/**"
      - "packages/domain-pms/**"
      - "packages/pms-vayada-adapter/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: playwright-pilot-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Frontend App Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run Playwright pilot smoke tests
        env:
          E2E_START_SERVERS: "1"
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14
