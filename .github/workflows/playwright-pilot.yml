name: Playwright Pilot

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/playwright-pilot.yml"
      - "playwright.config.ts"
      - "tests/e2e/**"
      - "apps/landing/**"
      - "apps/booking-web/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: playwright-pilot-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Landing + Booking Web Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright pilot smoke tests
        env:
          E2E_START_SERVERS: "1"
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14
