name: Deploy Next Vayada Admin

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-next-vayada-admin-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: vayada-admin-frontend
  AWS_ACCOUNT_ID: 269416271598
  APP_DIR: apps/vayada-admin
  NEXT_API_URL: https://next-api.vayada.com
  NEXT_ADMIN_PLATFORM_WORKOS_ORG_ID: ${{ vars.NEXT_PUBLIC_PLATFORM_WORKOS_ORG_ID }}

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::269416271598:role/vayada-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate next-admin WorkOS org config
        run: test -n "$NEXT_ADMIN_PLATFORM_WORKOS_ORG_ID"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.APP_DIR }}/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_API_URL }}
            NEXT_PUBLIC_AUTH_API_URL=${{ env.NEXT_API_URL }}
            NEXT_PUBLIC_AUTHKIT_LOGIN_ENABLED=true
            NEXT_PUBLIC_AUTHKIT_LEGACY_FALLBACK_ENABLED=false
            NEXT_PUBLIC_AUTHKIT_COMPATIBILITY_TOKEN_ENABLED=false
            NEXT_PUBLIC_PLATFORM_WORKOS_ORG_ID=${{ env.NEXT_ADMIN_PLATFORM_WORKOS_ORG_ID }}
            NEXT_PUBLIC_BOOKING_API_URL=${{ env.NEXT_API_URL }}
            NEXT_PUBLIC_PMS_URL=${{ env.NEXT_API_URL }}
            NEXT_PUBLIC_PMS_API_URL=${{ env.NEXT_API_URL }}
            NEXT_PUBLIC_BOOKING_URL_TEMPLATE=https://{slug}.next-booking.vayada.com
          tags: |
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:next-latest
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dispatch deploy to platform
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLATFORM_DEPLOY_TOKEN }}
          repository: vayada-marketplace/vayada-platform
          event-type: app-image-published
          client-payload: |
            {
              "service": "next-marketplace-admin",
              "ecr_repo": "${{ env.ECR_REPOSITORY }}",
              "image_sha": "${{ github.sha }}",
              "environment": "next"
            }
