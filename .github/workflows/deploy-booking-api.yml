name: Deploy Booking API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/booking-api/**"
      - "packages/**"
      - ".github/workflows/deploy-booking-api.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-booking-api-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: vayada-booking-backend
  AWS_ACCOUNT_ID: 269416271598
  APP_DIR: apps/booking-api

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: vayada_booking_user
          POSTGRES_PASSWORD: vayada_booking_password
          POSTGRES_DB: vayada_booking_db
        options: >-
          --health-cmd "pg_isready -U vayada_booking_user -d vayada_booking_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432

      auth-postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: vayada_auth_user
          POSTGRES_PASSWORD: vayada_auth_password
          POSTGRES_DB: vayada_auth_db
        options: >-
          --health-cmd "pg_isready -U vayada_auth_user -d vayada_auth_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5435:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up auth database schema
        working-directory: ${{ github.workspace }}
        run: |
          echo "Waiting for auth PostgreSQL..."
          for i in {1..30}; do
            if PGPASSWORD=vayada_auth_password psql -h localhost -p 5435 -U vayada_auth_user -d vayada_auth_db -c '\q' 2>/dev/null; then
              echo "Auth PostgreSQL is ready!"
              break
            fi
            echo "Attempt $i/30: Waiting..."
            sleep 2
          done
          echo "Running auth-db migrations..."
          for f in auth-db/migrations/*.sql; do
            echo "Running $f..."
            PGPASSWORD=vayada_auth_password psql -h localhost -p 5435 -U vayada_auth_user -d vayada_auth_db -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run booking database migrations
        run: |
          echo "Waiting for booking PostgreSQL..."
          for i in {1..30}; do
            if PGPASSWORD=vayada_booking_password psql -h localhost -p 5434 -U vayada_booking_user -d vayada_booking_db -c '\q' 2>/dev/null; then
              echo "Booking PostgreSQL is ready!"
              break
            fi
            echo "Attempt $i/30: Waiting..."
            sleep 2
          done
          echo "Running migrations..."
          for f in migrations/*.sql; do
            echo "Running $f..."
            PGPASSWORD=vayada_booking_password psql -h localhost -p 5434 -U vayada_booking_user -d vayada_booking_db -f "$f"
          done

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql://vayada_booking_user:vayada_booking_password@localhost:5434/vayada_booking_db
          AUTH_DATABASE_URL: postgresql://vayada_auth_user:vayada_auth_password@localhost:5435/vayada_auth_db
          MARKETPLACE_DATABASE_URL: ""
          CORS_ORIGINS: "http://localhost:3000,http://localhost:3003"
          JWT_SECRET_KEY: "test-secret-key-for-testing-only"
          PMS_API_URL: "http://localhost:8002"
          DEBUG: "true"
          ENVIRONMENT: "test"

  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::269416271598:role/vayada-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ env.APP_DIR }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dispatch deploy to platform
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLATFORM_DEPLOY_TOKEN }}
          repository: vayada-marketplace/vayada-platform
          event-type: app-image-published
          client-payload: |
            {
              "service": "booking-backend",
              "ecr_repo": "${{ env.ECR_REPOSITORY }}",
              "image_sha": "${{ github.sha }}",
              "environment": "production"
            }
