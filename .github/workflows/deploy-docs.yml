name: Deploy Docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/docs/**"
      - "docs/src/**"
      - "docs/static/**"
      - "docs/docusaurus.config.ts"
      - "docs/sidebars.ts"
      - "docs/package.json"
      - "docs/tsconfig.json"
      - ".github/workflows/deploy-docs.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-1
  AWS_ACCOUNT_ID: 269416271598
  S3_BUCKET: vayada-docs
  CLOUDFRONT_ALIAS: docs.vayada.com

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus site
        working-directory: docs
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::269416271598:role/vayada-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync docs/build/ s3://${{ env.S3_BUCKET }} --delete

      - name: Find CloudFront distribution by alias
        id: cloudfront
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items, '${{ env.CLOUDFRONT_ALIAS }}')].Id | [0]" \
            --output text)
          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            echo "Could not find CloudFront distribution for ${{ env.CLOUDFRONT_ALIAS }}"
            exit 1
          fi
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.cloudfront.outputs.distribution_id }}" \
            --paths "/*"

      - name: Deployment complete
        run: echo "✅ Docs deployed to https://${{ env.CLOUDFRONT_ALIAS }}"
