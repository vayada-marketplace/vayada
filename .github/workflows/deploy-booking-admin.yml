name: Deploy Booking Admin

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/booking-admin/**"
      - "packages/**"
      - ".github/workflows/deploy-booking-admin.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-booking-admin-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: vayada-booking-admin-frontend
  AWS_ACCOUNT_ID: 269416271598
  APP_DIR: apps/booking-admin

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::269416271598:role/vayada-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=https://target-api.vayada.com \
            --build-arg NEXT_PUBLIC_AUTH_API_URL=https://target-api.vayada.com \
            --build-arg NEXT_PUBLIC_AUTHKIT_LOGIN_ENABLED=true \
            --build-arg NEXT_PUBLIC_AUTHKIT_LEGACY_FALLBACK_ENABLED=false \
            --build-arg NEXT_PUBLIC_PLATFORM_MEDIA_API_URL=https://target-api.vayada.com \
            --build-arg NEXT_PUBLIC_PMS_URL=https://target-api.vayada.com \
            -t ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest \
            -t ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
            -f ${{ env.APP_DIR }}/Dockerfile \
            .
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Dispatch deploy to platform
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLATFORM_DEPLOY_TOKEN }}
          repository: vayada-marketplace/vayada-platform
          event-type: app-image-published
          client-payload: |
            {
              "service": "booking-admin",
              "ecr_repo": "${{ env.ECR_REPOSITORY }}",
              "image_sha": "${{ github.sha }}",
              "environment": "production"
            }
