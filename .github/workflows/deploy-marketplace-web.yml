name: Deploy Marketplace Web

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/marketplace-web/**'
      - 'packages/**'
      - '.github/workflows/deploy-marketplace-web.yml'

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-marketplace-web-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: vayada-frontend
  AWS_ACCOUNT_ID: 269416271598
  APP_DIR: apps/marketplace-web

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::269416271598:role/vayada-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ env.APP_DIR }}
          platforms: linux/amd64
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'https://api.vayada.com' }}
          tags: |
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment complete
        run: |
          echo "✅ Image pushed to ECR. App Runner will automatically deploy the new version."
