name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Typecheck, Lint, Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Architecture boundaries
        run: npm run check:architecture-boundaries

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend Tests (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: marketplace-api
            app_dir: apps/marketplace-api
            db_user: vayada_user
            db_password: vayada_password
            db_name: vayada_db
            test_db_name: vayada_test_db
            db_port: 5432
            cors_origins: http://localhost:3000,http://localhost:3001
            frontend_url: http://localhost:3000
          - app: booking-api
            app_dir: apps/booking-api
            db_user: vayada_booking_user
            db_password: vayada_booking_password
            db_name: vayada_booking_db
            db_port: 5434
            cors_origins: http://localhost:3000,http://localhost:3003
          - app: pms-api
            app_dir: apps/pms-api
            db_user: vayada_pms_user
            db_password: vayada_pms_password
            db_name: vayada_pms_db
            db_port: 5436
            cors_origins: http://localhost:3002,http://localhost:3003

    defaults:
      run:
        working-directory: ${{ matrix.app_dir }}

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ matrix.db_user }}
          POSTGRES_PASSWORD: ${{ matrix.db_password }}
          POSTGRES_DB: ${{ matrix.db_name }}
        options: >-
          --health-cmd "pg_isready -U ${{ matrix.db_user }} -d ${{ matrix.db_name }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - ${{ matrix.db_port }}:5432

      auth-postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: vayada_auth_user
          POSTGRES_PASSWORD: vayada_auth_password
          POSTGRES_DB: vayada_auth_db
        options: >-
          --health-cmd "pg_isready -U vayada_auth_user -d vayada_auth_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5435:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: ${{ matrix.app_dir }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up auth database schema
        working-directory: ${{ github.workspace }}
        run: |
          for i in {1..30}; do
            if PGPASSWORD=vayada_auth_password psql -h localhost -p 5435 -U vayada_auth_user -d vayada_auth_db -c '\q' 2>/dev/null; then
              break
            fi
            sleep 2
          done

          for f in auth-db/migrations/*.sql; do
            PGPASSWORD=vayada_auth_password psql -h localhost -p 5435 -U vayada_auth_user -d vayada_auth_db -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run app database migrations
        run: |
          for i in {1..30}; do
            if PGPASSWORD="${{ matrix.db_password }}" psql -h localhost -p "${{ matrix.db_port }}" -U "${{ matrix.db_user }}" -d "${{ matrix.db_name }}" -c '\q' 2>/dev/null; then
              break
            fi
            sleep 2
          done

          if [ "${{ matrix.app }}" = "marketplace-api" ]; then
            PGPASSWORD="${{ matrix.db_password }}" psql -h localhost -p "${{ matrix.db_port }}" -U "${{ matrix.db_user }}" -d "${{ matrix.db_name }}" -c "CREATE DATABASE ${{ matrix.test_db_name }};" || true
            PYTHONPATH=. python scripts/run_migrations.py
          else
            for f in migrations/*.sql; do
              PGPASSWORD="${{ matrix.db_password }}" psql -h localhost -p "${{ matrix.db_port }}" -U "${{ matrix.db_user }}" -d "${{ matrix.db_name }}" -f "$f"
            done
          fi
        env:
          DATABASE_URL: postgresql://${{ matrix.db_user }}:${{ matrix.db_password }}@localhost:${{ matrix.db_port }}/${{ matrix.test_db_name || matrix.db_name }}
          AUTH_DATABASE_URL: postgresql://vayada_auth_user:vayada_auth_password@localhost:5435/vayada_auth_db
          PYTHONPATH: .
          CORS_ORIGINS: ${{ matrix.cors_origins }}
          EMAIL_ENABLED: "true"
          DEBUG: "true"
          JWT_SECRET_KEY: test-secret-key-for-testing-only
          FRONTEND_URL: ${{ matrix.frontend_url || 'http://localhost:3000' }}

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql://${{ matrix.db_user }}:${{ matrix.db_password }}@localhost:${{ matrix.db_port }}/${{ matrix.test_db_name || matrix.db_name }}
          AUTH_DATABASE_URL: postgresql://vayada_auth_user:vayada_auth_password@localhost:5435/vayada_auth_db
          TEST_DATABASE_URL: postgresql://${{ matrix.db_user }}:${{ matrix.db_password }}@localhost:${{ matrix.db_port }}/${{ matrix.test_db_name || matrix.db_name }}
          MARKETPLACE_DATABASE_URL: ""
          PMS_API_URL: http://localhost:8002
          CORS_ORIGINS: ${{ matrix.cors_origins }}
          EMAIL_ENABLED: "true"
          DEBUG: "true"
          ENVIRONMENT: test
          JWT_SECRET_KEY: test-secret-key-for-testing-only
          FRONTEND_URL: ${{ matrix.frontend_url || 'http://localhost:3000' }}
          SMTP_HOST: ""
          S3_BUCKET_NAME: test-bucket
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test-access-key
          AWS_SECRET_ACCESS_KEY: test-secret-key

  required:
    name: Required Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - frontend
      - backend
    if: always()

    steps:
      - name: Verify required jobs
        run: |
          if [ "${{ needs.frontend.result }}" != "success" ] || [ "${{ needs.backend.result }}" != "success" ]; then
            echo "Frontend result: ${{ needs.frontend.result }}"
            echo "Backend result: ${{ needs.backend.result }}"
            exit 1
          fi
